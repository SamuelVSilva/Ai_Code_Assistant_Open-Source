# Configuracao de Provedores de IA - v0.4.b16
# Use variaveis de ambiente para API keys: ${OPENAI_API_KEY}
# Atualizado: 24/01/2026

providers:
  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"
    default_model: "gpt-4-turbo"
    models:
      - id: "gpt-4-turbo"
        name: "GPT-4 Turbo"
        context_window: 128000
        cost_input: 0.01
        cost_output: 0.03
      - id: "gpt-4"
        name: "GPT-4"
        context_window: 8192
        cost_input: 0.03
        cost_output: 0.06
      - id: "gpt-3.5-turbo"
        name: "GPT-3.5 Turbo"
        context_window: 16385
        cost_input: 0.0005
        cost_output: 0.0015
    settings:
      temperature: 0.7
      max_tokens: 4096
      stream: true

  anthropic:
    enabled: true
    api_key: "${ANTHROPIC_API_KEY}"
    default_model: "claude-3.5-sonnet"
    models:
      - id: "claude-3.5-sonnet"
        name: "Claude 3.5 Sonnet"
        context_window: 200000
        cost_input: 0.003
        cost_output: 0.015
        specialty: ["code", "creativity", "analysis"]
      - id: "claude-3-opus"
        name: "Claude 3 Opus"
        context_window: 200000
        cost_input: 0.015
        cost_output: 0.075
        specialty: ["creativity", "complex_analysis", "code"]
      - id: "claude-3-haiku"
        name: "Claude 3 Haiku"
        context_window: 200000
        cost_input: 0.00025
        cost_output: 0.00125
        specialty: ["fast", "simple_tasks"]
    settings:
      temperature: 0.7
      max_tokens: 4096
      stream: true

  deepseek:
    enabled: true
    api_key: "${DEEPSEEK_API_KEY}"
    default_model: "deepseek-coder"
    models:
      - id: "deepseek-coder"
        name: "DeepSeek Coder"
        context_window: 32768
        cost_input: 0.0001
        cost_output: 0.0002
        specialty: ["code"]
      - id: "deepseek-chat"
        name: "DeepSeek Chat"
        context_window: 32768
        cost_input: 0.0001
        cost_output: 0.0002
        specialty: ["chat"]
    settings:
      temperature: 0.5
      max_tokens: 4096
      stream: true

  # === Provedores Especializados ===
  
  grok:
    enabled: false  # Ativar quando tiver API key
    api_key: "${GROK_API_KEY}"
    default_model: "grok-2"
    models:
      - id: "grok-2"
        name: "Grok 2"
        context_window: 128000
        specialty: ["creativity", "image_generation", "video"]
    settings:
      temperature: 0.7
      max_tokens: 4096
      stream: true

  gemini:
    enabled: false  # Ativar quando tiver API key
    api_key: "${GEMINI_API_KEY}"
    default_model: "gemini-pro"
    models:
      - id: "gemini-pro"
        name: "Gemini Pro"
        context_window: 128000
        specialty: ["multimodal", "analysis"]
      - id: "gemini-nano-banana"
        name: "Gemini Nano Banana"
        specialty: ["image_generation"]
    settings:
      temperature: 0.7
      stream: true

  # Provedores especializados (planejados)
  meshy_ai:
    enabled: false
    api_key: "${MESHY_API_KEY}"
    specialty: "3d_modeling"
    
  speechigy:
    enabled: false
    api_key: "${SPEECHIGY_API_KEY}"
    specialty: "text_to_speech"
    
  rosebud_ai:
    enabled: false
    api_key: "${ROSEBUD_API_KEY}"
    specialty: "game_creation"

# Roteamento inteligente por tipo de tarefa
routing:
  code_analysis: ["deepseek", "anthropic", "openai"]
  code_generation: ["deepseek", "anthropic", "openai"]
  general_chat: ["anthropic", "openai", "deepseek"]
  long_context: ["anthropic", "openai"]
  fast_cheap: ["deepseek", "openai:gpt-3.5-turbo", "anthropic:claude-3-haiku"]
  creativity: ["anthropic:claude-3-opus", "grok", "openai:gpt-4-turbo"]
  image_generation: ["gemini:gemini-nano-banana", "grok", "openai"]
  video_generation: ["grok", "openai"]
  model_3d: ["meshy_ai"]
  text_to_speech: ["speechigy"]
  game_creation: ["rosebud_ai", "anthropic:claude-3-opus"]

# Configuracoes de otimizacao
optimization:
  cache:
    enabled: true
    ttl_hours: 24
    max_entries: 1000

  # Tokens para CONSULTAS EXTERNAS (provedores como DeepSeek, Claude, GPT)
  external_tokens:
    history_limit: 20
    auto_summarize_after: 10
    compress_code: true
    max_code_tokens: 2000
    max_context_tokens: 8000

  # IAs PERSONALIZADAS - SEM LIMITE DE RETORNO
  custom_ai:
    no_return_limit: true  # IAs personalizadas retornam resposta COMPLETA
    external_query_limit: 4096  # Limite apenas quando consultam provedores externos
    enable_streaming: true  # Streaming para respostas longas
    enable_lazy_loading: true  # Lazy loading para mensagens antigas
    virtualize_file_list: true  # Virtualização para listas de arquivos grandes

# Fallback automatico
fallback:
  enabled: true
  order: ["openai", "anthropic", "deepseek"]
  retry_count: 2
  retry_delay_ms: 1000

